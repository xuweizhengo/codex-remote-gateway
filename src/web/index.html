<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Codex Remote</title>
    <style>
        :root {
            color-scheme: light;
            font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: #f5f6f8;
            color: #20242a;
        }
        * { box-sizing: border-box; }
        body { margin: 0; }
        header {
            height: 56px;
            display: flex;
            align-items: center;
            padding: 0 28px;
            border-bottom: 1px solid #e1e5ec;
            background: #ffffff;
        }
        h1 { margin: 0; font-size: 18px; font-weight: 700; }
        main {
            max-width: 920px;
            margin: 0 auto;
            padding: 28px;
            display: grid;
            gap: 18px;
        }
        .surface, details {
            background: #ffffff;
            border: 1px solid #e1e5ec;
            border-radius: 8px;
        }
        .surface { padding: 28px; }
        .hero {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 24px;
            align-items: start;
        }
        .state {
            display: inline-flex;
            width: fit-content;
            border-radius: 999px;
            padding: 5px 11px;
            background: #fff6df;
            color: #8a5a00;
            font-size: 13px;
            font-weight: 700;
        }
        .state.ok { background: #e8f7ee; color: #137333; }
        .state.error { background: #fdecea; color: #b3261e; }
        h2 {
            margin: 16px 0 8px;
            font-size: 30px;
            line-height: 1.18;
            letter-spacing: 0;
        }
        .lead {
            margin: 0;
            max-width: 620px;
            color: #596170;
            font-size: 15px;
            line-height: 1.65;
        }
        .actions {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 22px;
        }
        button {
            border: 1px solid #1f6feb;
            background: #1f6feb;
            color: #ffffff;
            border-radius: 6px;
            padding: 10px 14px;
            min-height: 40px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 700;
        }
        button.secondary { background: #ffffff; color: #1f6feb; }
        button.danger { border-color: #c2410c; background: #ffffff; color: #c2410c; }
        button:disabled {
            cursor: not-allowed;
            opacity: 0.55;
        }
        .command {
            min-width: 210px;
            border-left: 3px solid #1f6feb;
            padding: 10px 0 10px 14px;
            color: #20242a;
            font-size: 14px;
            line-height: 1.7;
            background: #f8fafc;
        }
        .command strong {
            display: block;
            margin-bottom: 2px;
            font-size: 13px;
        }
        .command code {
            display: block;
            font-size: 16px;
            font-weight: 700;
            color: #1f6feb;
        }
        .steps {
            display: grid;
            gap: 0;
            margin-top: 28px;
            border-top: 1px solid #e8ebf0;
        }
        .step {
            display: grid;
            grid-template-columns: 32px 1fr auto;
            gap: 12px;
            align-items: start;
            padding: 16px 0;
            border-bottom: 1px solid #e8ebf0;
        }
        .step-dot {
            width: 22px;
            height: 22px;
            margin-top: 1px;
            border-radius: 999px;
            border: 2px solid #d0d6df;
            background: #ffffff;
        }
        .step.done .step-dot {
            border-color: #137333;
            background: #137333;
            box-shadow: inset 0 0 0 5px #ffffff;
        }
        .step h3 { margin: 0 0 4px; font-size: 15px; }
        .step p { margin: 0; color: #596170; font-size: 13px; line-height: 1.5; }
        .step-status {
            border-radius: 999px;
            padding: 4px 9px;
            background: #f1f3f6;
            color: #596170;
            font-size: 12px;
            font-weight: 700;
            white-space: nowrap;
        }
        .step.done .step-status { background: #e8f7ee; color: #137333; }
        .message {
            margin: 14px 0 0;
            min-height: 20px;
            color: #596170;
            font-size: 13px;
            line-height: 1.5;
        }
        .qr-wrap {
            display: none;
            margin-top: 22px;
            padding-top: 22px;
            border-top: 1px solid #e8ebf0;
            gap: 16px;
            align-items: start;
            grid-template-columns: 220px 1fr;
        }
        .qr-wrap.visible { display: grid; }
        .qr {
            width: 220px;
            min-height: 220px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid #dfe3ea;
            border-radius: 8px;
            background: #ffffff;
        }
        .qr:empty { display: none; }
        .hint {
            color: #596170;
            font-size: 13px;
            line-height: 1.6;
            white-space: pre-wrap;
        }
        details { padding: 0; }
        summary {
            cursor: pointer;
            padding: 16px 18px;
            font-weight: 700;
            font-size: 14px;
        }
        .details-body {
            padding: 0 18px 18px;
            display: grid;
            gap: 14px;
        }
        .field {
            display: grid;
            gap: 6px;
            max-width: 560px;
        }
        .field label {
            color: #596170;
            font-size: 12px;
            font-weight: 700;
        }
        input {
            min-width: 0;
            border: 1px solid #ccd4df;
            border-radius: 6px;
            padding: 9px 10px;
            font: inherit;
            background: #ffffff;
            color: #20242a;
        }
        pre {
            margin: 0;
            white-space: pre-wrap;
            background: #f1f3f6;
            border-radius: 6px;
            padding: 12px;
            max-height: 300px;
            overflow: auto;
            font-size: 12px;
        }
        @media (max-width: 760px) {
            header { padding: 0 18px; }
            main { padding: 16px; }
            .surface { padding: 20px; }
            .hero { grid-template-columns: 1fr; }
            h2 { font-size: 24px; }
            .command { min-width: 0; }
            .step { grid-template-columns: 28px 1fr; }
            .step-status { grid-column: 2; width: fit-content; }
            .qr-wrap.visible { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
<header>
    <h1>Codex Remote</h1>
</header>
<main>
    <section class="surface">
        <div class="hero">
            <div>
                <span id="app.state" class="state">检查中</span>
                <h2 id="app.title">正在读取状态</h2>
                <p id="app.subtitle" class="lead">请稍等。</p>
                <div class="actions">
                    <button id="primary.action" onclick="runPrimaryAction()">刷新状态</button>
                    <button id="secondary.action" class="secondary" onclick="runSecondaryAction()">暂停飞书接入</button>
                </div>
                <p id="app.message" class="message"></p>
            </div>
            <div class="command">
                <strong>Codex App 配置</strong>
                <code>chatgpt_base_url</code>
                <span>指向本地 backend</span>
            </div>
        </div>

        <div class="steps">
            <div id="step.feishu" class="step">
                <div class="step-dot"></div>
                <div>
                    <h3>接入飞书</h3>
                    <p>飞书消息会进入已绑定的本地 Codex App 会话。</p>
                </div>
                <span id="step.feishu.status" class="step-status">待处理</span>
            </div>
            <div id="step.config" class="step">
                <div class="step-dot"></div>
                <div>
                    <h3>配置 Codex App</h3>
                    <p>在 Codex 配置里把 chatgpt_base_url 指向本地 backend，并使用 chatgptAuthTokens。</p>
                </div>
                <span id="step.config.status" class="step-status">需确认</span>
            </div>
            <div id="step.codex" class="step">
                <div class="step-dot"></div>
                <div>
                    <h3>打开远程控制</h3>
                    <p>启动 Codex App，并在 App 里启用 remote control。</p>
                </div>
                <span id="step.codex.status" class="step-status">等待运行</span>
            </div>
        </div>

        <div id="feishu.qrWrap" class="qr-wrap">
            <div id="feishu.qr" class="qr"></div>
            <div>
                <h3>请使用飞书扫码</h3>
                <p id="feishu.onboardStatus" class="message"></p>
                <p id="feishu.qrHint" class="hint"></p>
            </div>
        </div>
    </section>

    <details id="advanced">
        <summary>技术细节</summary>
        <div class="details-body">
            <pre id="app.configHint"></pre>
            <div class="field">
                <label for="codex.providerName">第三方模型 provider name，可选</label>
                <input id="codex.providerName" value="ai-codex" />
            </div>
            <div class="field">
                <label for="codex.providerBaseUrl">第三方模型 base_url，可选</label>
                <input id="codex.providerBaseUrl" placeholder="可选" />
            </div>
            <div class="field">
                <label for="codex.providerKey">第三方模型 key，可选</label>
                <input id="codex.providerKey" placeholder="可选" />
            </div>
            <div class="field">
                <label for="codex.model">模型名，可选</label>
                <input id="codex.model" placeholder="可选" />
            </div>
            <div class="actions">
                <button onclick="configureCodexApp()">一键配置 Codex App</button>
                <button class="danger" onclick="uninstallCodexApp()">卸载 Codex App 配置</button>
                <button class="secondary" onclick="setBridgeEnabled(true)">启用飞书接入</button>
                <button class="secondary" onclick="setBridgeEnabled(false)">暂停飞书接入</button>
                <button class="secondary" onclick="startBridge()">启动飞书监听</button>
                <button class="secondary" onclick="stopBridge()">停止飞书监听</button>
                <button class="secondary" onclick="loadAll()">刷新</button>
            </div>
            <pre id="remote.detail"></pre>
            <pre id="events"></pre>
        </div>
    </details>
</main>

<script>
let onboardTimer = null;
let currentPrimaryAction = "refresh";
let currentSecondaryAction = "pause";
const byId = (id) => document.getElementById(id);

async function loadAll() {
    const [status, config, remote, backend, codexApp, events] = await Promise.all([
        fetch("/api/status").then(r => r.json()),
        fetch("/api/config").then(r => r.json()),
        fetch("/api/remote-control/status").then(r => r.json()),
        fetch("/api/remote-control/backend-status").then(r => r.json()),
        fetch("/api/codex-app/status").then(r => r.json()),
        fetch("/api/events").then(r => r.json()),
    ]);

    const feishuWs = status.feishuWs || {};
    const feishuReady = Boolean(backend.feishuConfigured);
    const bridgeEnabled = Boolean(backend.enabled);
    const guiApiBase = codexApp.guiApiBase || {};
    const codexAppConfigured = Boolean(codexApp.configured);
    const codexConnected = Boolean(remote.connected && remote.initialized);
    const backendUrl = backend.remoteControlBaseUrl || `http://${status.bind || "127.0.0.1:3847"}/backend-api`;

    updateStep("step.feishu", feishuReady && feishuWs.connected, feishuReady && feishuWs.connected ? "完成" : "待扫码");
    updateStep("step.config", codexAppConfigured, codexAppConfigured ? "完成" : "需确认");
    updateStep("step.codex", codexConnected, codexConnected ? "已连接" : (codexAppConfigured ? "等待打开" : "待配置"));

    if (!feishuReady || !feishuWs.connected) {
        setHero("需要接入", "接入飞书后就可以双端会话", "用飞书扫码确认一次，之后飞书消息会进入当前本地 Codex 会话。", "扫码接入飞书", "feishu", true);
    } else if (!bridgeEnabled) {
        setHero("已暂停", "飞书接入目前关闭", "启用后，飞书消息会转发到已连接的 Codex App remote-control 会话。", "启用飞书接入", "enable", true);
    } else if (!status.running) {
        setHero("需要启动", "飞书监听没有运行", "点击启动后，飞书消息监听会恢复。", "启动飞书监听", "bridge", true);
    } else if (!codexAppConfigured) {
        setHero("已准备好", "先配置 Codex App，再双击启动", "点击一键配置会写入本地 chatgpt_base_url 与 chatgptAuthTokens；然后启动 Codex App 并启用 remote control。", "一键配置 Codex App", "configureCodexApp", true);
    } else if (!codexConnected) {
        setHero("已配置", "现在启动 Codex App 并打开远程控制", "本地 Codex App 配置已经就绪。双击启动 Codex App，并在 App 里启用 remote control。", "刷新状态", "refresh", true);
    } else {
        setHero("正在同步", "Codex 已接入飞书", "你可以在本地终端和飞书里继续同一个会话。", "刷新状态", "refresh", true);
    }

    currentSecondaryAction = bridgeEnabled ? "pause" : "enable";
    byId("secondary.action").textContent = bridgeEnabled ? "暂停飞书接入" : "启用飞书接入";
    byId("secondary.action").style.display = "inline-flex";

    byId("app.configHint").textContent = [
        "Codex App config:",
        `chatgpt_base_url = "${backendUrl}"`,
        "",
        "Codex App auth:",
        'auth_mode = "chatgptAuthTokens"',
        "",
        "点击「一键配置 Codex App」会写入 ~/.codex/config.toml 和 ~/.codex/auth.json，并为已有文件创建 .bak 备份。",
        "不会修改 Codex App 的启动方式；Finder/Dock 双击仍按官方 App 自己的入口启动。",
        "第三方模型 key 放在 Codex model_providers.* 配置里，不放在 codex-remote config.toml。"
    ].join("\n");

    byId("remote.detail").textContent = [
        `页面地址：http://${status.bind || "127.0.0.1:3847"}`,
        `codex-remote state：${config.statePath || "未找到"}`,
        `Codex App chatgpt_base_url：${backendUrl}`,
        `Codex App home：${codexApp.codexHome || "未找到"}`,
        `Codex App config：${codexApp.configOk ? "已配置" : codexApp.configError || "未配置"}`,
        `Codex App auth：${codexApp.authOk ? "已配置" : codexApp.authError || "未配置"}`,
        `Codex App GUI backend：${guiApiBase.value || "未设置"}`,
        `飞书监听：${feishuWs.connected ? "已连接" : feishuWs.lastError || "未连接"}`,
        `bridge：${bridgeEnabled ? "已启用" : "已暂停"}`,
        `remote-control 连接：${remote.connected ? "已连接" : remote.lastError || "未连接"}`,
        `remote-control 初始化：${remote.initialized ? "完成" : "等待"}`,
        `当前 thread：${remote.currentThreadId || "无"}`,
    ].join("\n");
    byId("events").textContent = events.slice().reverse().map(e =>
        `${new Date(Number(e.atMs)).toLocaleString()} [${e.level}] ${e.kind}: ${e.message}`
    ).join("\n");
}

function setHero(state, title, subtitle, buttonText, action, ok) {
    byId("app.state").textContent = state;
    byId("app.state").className = ok && (state === "已准备好" || state === "正在同步") ? "state ok" : "state";
    byId("app.title").textContent = title;
    byId("app.subtitle").textContent = subtitle;
    byId("primary.action").textContent = buttonText;
    currentPrimaryAction = action;
}

function updateStep(id, done, label) {
    byId(id).className = done ? "step done" : "step";
    byId(`${id}.status`).textContent = label;
}

async function runPrimaryAction() {
    if (currentPrimaryAction === "feishu") return startFeishuOnboard();
    if (currentPrimaryAction === "enable") return setBridgeEnabled(true);
    if (currentPrimaryAction === "bridge") return startBridge();
    if (currentPrimaryAction === "configureCodexApp") return configureCodexApp();
    return loadAll();
}

async function runSecondaryAction() {
    if (currentSecondaryAction === "pause") return setBridgeEnabled(false);
    return setBridgeEnabled(true);
}

async function startBridge() {
    setMessage("正在启动飞书监听...");
    await fetch("/api/bridge/start", { method: "POST" });
    await loadAll();
}

async function stopBridge() {
    setMessage("正在停止飞书监听...");
    await fetch("/api/bridge/stop", { method: "POST" });
    await loadAll();
}

async function configureCodexApp() {
    const providerName = byId("codex.providerName").value.trim();
    const providerBaseUrl = byId("codex.providerBaseUrl").value.trim();
    const providerKey = byId("codex.providerKey").value.trim();
    const model = byId("codex.model").value.trim();
    setMessage("正在配置 Codex App...");
    const res = await fetch("/api/codex-app/configure", {
        method: "POST",
        headers: { "content-type": "application/json" },
        body: JSON.stringify({ providerName, providerBaseUrl, providerKey, model })
    });
    const data = await res.json();
    if (!res.ok || !data.ok) {
        setMessage(data.error || "配置 Codex App 失败");
        byId("advanced").open = true;
        return;
    }
    setMessage(`已配置 Codex App：${data.configPath}；auth 已写入：${data.authPath}；请完全退出并重新打开 Codex App。`);
    byId("advanced").open = true;
    await loadAll();
}

async function uninstallCodexApp() {
    if (!confirm("移除 Codex App 的本地 remote-control 配置？这会删除 chatgpt_base_url 和本地 chatgptAuthTokens。")) {
        return;
    }
    setMessage("正在卸载 Codex App 本地配置...");
    const res = await fetch("/api/codex-app/uninstall", { method: "POST" });
    const data = await res.json();
    if (!res.ok || !data.ok) {
        setMessage(data.error || "卸载 Codex App 配置失败");
        byId("advanced").open = true;
        return;
    }
    const report = data.report || {};
    setMessage(`已卸载 Codex App 本地配置：${report.configPath || ""}；请完全退出并重新打开 Codex App。`);
    byId("advanced").open = true;
    await loadAll();
}

async function setBridgeEnabled(enabled) {
    setMessage(enabled ? "正在启用飞书接入..." : "正在暂停飞书接入...");
    await fetch(enabled ? "/api/bridge/start" : "/api/bridge/stop", { method: "POST" });
    await loadAll();
}

async function startFeishuOnboard() {
    clearInterval(onboardTimer);
    setMessage("正在创建扫码确认...");
    byId("feishu.qrWrap").className = "qr-wrap visible";
    byId("feishu.qr").innerHTML = "";
    byId("feishu.qrHint").textContent = "";
    byId("feishu.onboardStatus").textContent = "";
    const res = await fetch("/api/feishu/onboard/start", { method: "POST" });
    const data = await res.json();
    if (!res.ok) {
        setMessage(data.error || "创建失败");
        return;
    }
    byId("feishu.qr").innerHTML = data.qrSvg || "";
    byId("feishu.qrHint").textContent = "";
    byId("feishu.onboardStatus").textContent = "扫码完成后会自动关闭。";
    const intervalMs = 1500;
    onboardTimer = setInterval(async () => {
        const poll = await fetch("/api/feishu/onboard/poll", {
            method: "POST",
            headers: { "content-type": "application/json" },
            body: JSON.stringify({ deviceCode: data.deviceCode })
        });
        const result = await poll.json();
        if (result.done) {
            clearInterval(onboardTimer);
            byId("feishu.qrWrap").className = "qr-wrap";
            byId("feishu.qr").innerHTML = "";
            byId("feishu.qrHint").textContent = "";
            setMessage("飞书已接入。");
            await loadAll();
        } else if (result.error === "authorization_pending" || result.error === "slow_down") {
            byId("feishu.onboardStatus").textContent = "扫码完成后会自动关闭。";
        } else if (result.error) {
            byId("feishu.onboardStatus").textContent = "接入失败，请重新扫码。";
        }
    }, intervalMs);
}

function setMessage(text) {
    byId("app.message").textContent = text;
}

loadAll();
setInterval(loadAll, 3000);
</script>
</body>
</html>
