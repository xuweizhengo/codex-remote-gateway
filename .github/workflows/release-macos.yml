name: release-macos

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-sign-notarize:
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15
            file_slug: universal
            asset_key: macos-universal
            sparkle_key: macos-sparkle-universal
            manifest_name: latest-macos.json
            intel_manifest_name: latest-macos-intel.json
    env:
      MACOS_FILE_SLUG: ${{ matrix.file_slug }}
      MACOS_ASSET_KEY: ${{ matrix.asset_key }}
      MACOS_SPARKLE_KEY: ${{ matrix.sparkle_key }}
      MACOS_MANIFEST_NAME: ${{ matrix.manifest_name }}
      MACOS_INTEL_MANIFEST_NAME: ${{ matrix.intel_manifest_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install CMake
        run: brew install cmake

      - name: Restore Cargo Cache
        uses: Swatinem/rust-cache@v2

      - name: Reset wxWidgets CMake Cache
        run: |
          set -euo pipefail
          rm -rf target/release/wxwidgets_cmake_build
          rm -rf target/release/wxdragon_sys_cmake_build

      - name: Import Developer ID Certificate
        env:
          APPLE_CERTIFICATE_P12_BASE64: ${{ secrets.APPLE_CERTIFICATE_P12_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail
          export CERT_PATH="$RUNNER_TEMP/developer-id.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          python3 -c 'import base64, os, pathlib; pathlib.Path(os.environ["CERT_PATH"]).write_bytes(base64.b64decode(os.environ["APPLE_CERTIFICATE_P12_BASE64"]))'
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

      - name: Build App Bundle
        run: |
          set -euo pipefail
          APP_NAME="CodexHub"
          APP="target/dist/$APP_NAME.app"
          CONTENTS="$APP/Contents"
          MACOS="$CONTENTS/MacOS"
          RESOURCES="$CONTENTS/Resources"

          # Install cross-compilation targets for universal binary
          rustup target add aarch64-apple-darwin x86_64-apple-darwin

          # Build wxWidgets as universal (arm64 + x86_64) and compile for native arch
          export WX_OSX_ARCHITECTURES="arm64;x86_64"
          PATH="$(brew --prefix)/bin:$PATH" cargo build --release --features gui --bin codexhub --target aarch64-apple-darwin

          # Compile for Intel (wxWidgets libs are already fat, no rebuild needed)
          PATH="$(brew --prefix)/bin:$PATH" cargo build --release --features gui --bin codexhub --target x86_64-apple-darwin

          # Create universal binary
          mkdir -p target/release
          lipo -create \
            target/aarch64-apple-darwin/release/codexhub \
            target/x86_64-apple-darwin/release/codexhub \
            -output target/release/codexhub

          CARGO_VERSION="$(sed -n 's/^version *= *"\([^"]*\)".*/\1/p' Cargo.toml | head -n 1)"
          if [ -z "$CARGO_VERSION" ]; then
            echo "Could not read package version from Cargo.toml" >&2
            exit 1
          fi
          if [ "${GITHUB_REF_TYPE:-}" = "tag" ]; then
            APP_VERSION="$GITHUB_REF_NAME"
          else
            APP_VERSION="v$CARGO_VERSION"
          fi
          {
            echo "APP_VERSION=$APP_VERSION"
            echo "MACOS_DMG_NAME=CodexHub-$APP_VERSION-macos-$MACOS_FILE_SLUG.dmg"
            echo "MACOS_APP_ZIP_NAME=CodexHub-$APP_VERSION-macos-$MACOS_FILE_SLUG.app.zip"
          } >> "$GITHUB_ENV"

          rm -rf "$APP"
          mkdir -p "$MACOS" "$RESOURCES/brand"
          cp "packaging/macos/Info.plist" "$CONTENTS/Info.plist"
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString ${CARGO_VERSION%%[-+]*}" "$CONTENTS/Info.plist"
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion ${GITHUB_RUN_NUMBER:-1}" "$CONTENTS/Info.plist"
          cp "packaging/macos/AppIcon.icns" "$RESOURCES/AppIcon.icns"
          cp packaging/brand/*.png "$RESOURCES/brand/"
          cp "target/release/codexhub" "$MACOS/$APP_NAME"
          chmod +x "$MACOS/$APP_NAME"

      - name: Sign And Notarize
        env:
          APPLE_CODESIGN_IDENTITY: ${{ secrets.APPLE_CODESIGN_IDENTITY }}
          NOTARY_KEYCHAIN_PROFILE: ${{ secrets.NOTARY_KEYCHAIN_PROFILE }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
          APPLE_API_KEY_P8: ${{ secrets.APPLE_API_KEY_P8 }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        run: |
          set -euo pipefail
          APP="target/dist/CodexHub.app"
          DMG="target/dist/CodexHub.dmg"
          DMG_STAGING="target/dist/dmg"
          ZIP="target/dist/${MACOS_APP_ZIP_NAME}"
          NOTARY_ZIP="target/dist/CodexHub-notary.zip"
          ENTITLEMENTS="packaging/macos/entitlements.plist"

          if [ -n "${APPLE_API_KEY_P8:-}" ]; then
            API_KEY_PATH="$RUNNER_TEMP/AuthKey_${APPLE_API_KEY_ID}.p8"
            printf '%s' "$APPLE_API_KEY_P8" > "$API_KEY_PATH"
            chmod 600 "$API_KEY_PATH"
            export APPLE_API_KEY_PATH="$API_KEY_PATH"
          fi

          notary_submit() {
            local path="$1"
            if [ -n "${NOTARY_KEYCHAIN_PROFILE:-}" ]; then
              xcrun notarytool submit "$path" --keychain-profile "$NOTARY_KEYCHAIN_PROFILE" --wait
            elif [ -n "${APPLE_API_KEY_ID:-}" ]; then
              xcrun notarytool submit "$path" \
                --key "$APPLE_API_KEY_PATH" \
                --key-id "$APPLE_API_KEY_ID" \
                --issuer "$APPLE_API_ISSUER_ID" \
                --wait
            else
              xcrun notarytool submit "$path" \
                --apple-id "$APPLE_ID" \
                --team-id "$APPLE_TEAM_ID" \
                --password "$APPLE_APP_SPECIFIC_PASSWORD" \
                --wait
            fi
          }

          codesign --force --timestamp --options runtime \
            --entitlements "$ENTITLEMENTS" \
            --sign "$APPLE_CODESIGN_IDENTITY" \
            "$APP"

          codesign --verify --deep --strict --verbose=2 "$APP"
          ditto -c -k --keepParent "$APP" "$NOTARY_ZIP"
          notary_submit "$NOTARY_ZIP"
          xcrun stapler staple "$APP"
          rm -f "$NOTARY_ZIP"
          ditto -c -k --keepParent "$APP" "$ZIP"

          rm -rf "$DMG_STAGING"
          mkdir -p "$DMG_STAGING"
          ditto "$APP" "$DMG_STAGING/CodexHub.app"
          ln -s /Applications "$DMG_STAGING/Applications"

          hdiutil create -volname "CodexHub" -srcfolder "$DMG_STAGING" -ov -format UDZO "$DMG"
          codesign --force --timestamp --sign "$APPLE_CODESIGN_IDENTITY" "$DMG"
          notary_submit "$DMG"
          xcrun stapler staple "$DMG"
          mv "$DMG" "target/dist/${MACOS_DMG_NAME}"
          DMG="target/dist/${MACOS_DMG_NAME}"

          xcrun stapler validate "$APP"
          xcrun stapler validate "$DMG"
          spctl --assess --type execute --verbose=4 "$APP"
          spctl --assess --type open --context context:primary-signature --verbose=4 "$DMG"

      - name: Write macOS Update Metadata
        if: startsWith(github.ref, 'refs/tags/')
        env:
          RELEASE_TAG: ${{ github.ref_name }}
          RELEASE_REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          import os
          import hashlib
          from pathlib import Path

          dist = Path("target/dist")
          dmg_name = os.environ["MACOS_DMG_NAME"]
          app_zip_name = os.environ["MACOS_APP_ZIP_NAME"]
          asset_key = os.environ["MACOS_ASSET_KEY"]
          sparkle_key = os.environ["MACOS_SPARKLE_KEY"]
          manifest_name = os.environ["MACOS_MANIFEST_NAME"]
          intel_manifest_name = os.environ["MACOS_INTEL_MANIFEST_NAME"]
          dmg_path = dist / dmg_name
          app_zip_path = dist / app_zip_name
          release_tag = os.environ["RELEASE_TAG"]
          repository = os.environ["RELEASE_REPOSITORY"]
          release_url = f"https://github.com/{repository}/releases/tag/{release_tag}"
          download_base_url = f"https://github.com/{repository}/releases/download/{release_tag}"

          def sha256(path: Path) -> str:
              digest = hashlib.sha256()
              with path.open("rb") as handle:
                  for chunk in iter(lambda: handle.read(1024 * 1024), b""):
                      digest.update(chunk)
              return digest.hexdigest()

          manifest = {
              "version": release_tag,
              "releaseUrl": release_url,
              "notes": "",
              "assets": {
                  asset_key: {
                      "type": "dmg",
                      "url": f"{download_base_url}/{dmg_name}",
                      "sha256": sha256(dmg_path),
                      "size": dmg_path.stat().st_size,
                      "signed": True,
                      "notarized": True,
                  },
                  sparkle_key: {
                      "type": "app-zip",
                      "url": f"{download_base_url}/{app_zip_name}",
                      "sha256": sha256(app_zip_path),
                      "size": app_zip_path.stat().st_size,
                      "signed": True,
                      "notarized": True,
                  },
              },
          }
          Path(f"target/dist/{manifest_name}").write_text(
              json.dumps(manifest, ensure_ascii=False, indent=2) + "\n",
              encoding="utf-8",
          )
          intel_manifest = {
              "version": release_tag,
              "releaseUrl": release_url,
              "notes": "",
              "assets": {
                  "macos-intel": manifest["assets"][asset_key],
                  "macos-sparkle-intel": manifest["assets"][sparkle_key],
              },
          }
          Path(f"target/dist/{intel_manifest_name}").write_text(
              json.dumps(intel_manifest, ensure_ascii=False, indent=2) + "\n",
              encoding="utf-8",
          )
          PY

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: CodexHub-macOS-${{ matrix.file_slug }}
          path: |
            target/dist/CodexHub-*-macos-${{ matrix.file_slug }}.dmg
            target/dist/CodexHub-*-macos-${{ matrix.file_slug }}.app.zip
            target/dist/${{ matrix.manifest_name }}
            target/dist/${{ matrix.intel_manifest_name }}

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          overwrite_files: true
          body_path: RELEASE_NOTES.md
          prerelease: ${{ contains(github.ref_name, '-') }}
          make_latest: ${{ contains(github.ref_name, '-') && 'false' || 'true' }}
          files: |
            target/dist/CodexHub-*-macos-${{ matrix.file_slug }}.dmg
            target/dist/CodexHub-*-macos-${{ matrix.file_slug }}.app.zip
            target/dist/${{ matrix.manifest_name }}
            target/dist/${{ matrix.intel_manifest_name }}
