name: release-macos

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-sign-notarize:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install CMake
        run: brew install cmake

      - name: Restore Cargo Cache
        uses: Swatinem/rust-cache@v2

      - name: Import Developer ID Certificate
        env:
          APPLE_CERTIFICATE_P12_BASE64: ${{ secrets.APPLE_CERTIFICATE_P12_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail
          export CERT_PATH="$RUNNER_TEMP/developer-id.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          python3 -c 'import base64, os, pathlib; pathlib.Path(os.environ["CERT_PATH"]).write_bytes(base64.b64decode(os.environ["APPLE_CERTIFICATE_P12_BASE64"]))'
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

      - name: Build App Bundle
        run: |
          set -euo pipefail
          APP_NAME="Codex Remote"
          APP="target/dist/$APP_NAME.app"
          CONTENTS="$APP/Contents"
          MACOS="$CONTENTS/MacOS"
          RESOURCES="$CONTENTS/Resources"

          cargo build --release
          PATH="/opt/homebrew/bin:$PATH" cargo build --release --features gui --bin codex-remote-gui

          rm -rf "$APP"
          mkdir -p "$MACOS" "$RESOURCES/brand"
          cp "packaging/macos/Info.plist" "$CONTENTS/Info.plist"
          cp "packaging/macos/AppIcon.icns" "$RESOURCES/AppIcon.icns"
          cp packaging/brand/*.png "$RESOURCES/brand/"
          cp "target/release/codex-remote-gui" "$MACOS/$APP_NAME"
          cp "target/release/codex-remote" "$RESOURCES/codex-remote"
          chmod +x "$MACOS/$APP_NAME" "$RESOURCES/codex-remote"

      - name: Sign And Notarize
        env:
          APPLE_CODESIGN_IDENTITY: ${{ secrets.APPLE_CODESIGN_IDENTITY }}
          NOTARY_KEYCHAIN_PROFILE: ${{ secrets.NOTARY_KEYCHAIN_PROFILE }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
          APPLE_API_KEY_P8: ${{ secrets.APPLE_API_KEY_P8 }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        run: |
          set -euo pipefail
          APP="target/dist/Codex Remote.app"
          DMG="target/dist/Codex Remote.dmg"
          ZIP="target/dist/Codex Remote.zip"
          ENTITLEMENTS="packaging/macos/entitlements.plist"

          if [ -n "${APPLE_API_KEY_P8:-}" ]; then
            API_KEY_PATH="$RUNNER_TEMP/AuthKey_${APPLE_API_KEY_ID}.p8"
            printf '%s' "$APPLE_API_KEY_P8" > "$API_KEY_PATH"
            chmod 600 "$API_KEY_PATH"
            export APPLE_API_KEY_PATH="$API_KEY_PATH"
          fi

          notary_submit() {
            local path="$1"
            if [ -n "${NOTARY_KEYCHAIN_PROFILE:-}" ]; then
              xcrun notarytool submit "$path" --keychain-profile "$NOTARY_KEYCHAIN_PROFILE" --wait
            elif [ -n "${APPLE_API_KEY_ID:-}" ]; then
              xcrun notarytool submit "$path" \
                --key "$APPLE_API_KEY_PATH" \
                --key-id "$APPLE_API_KEY_ID" \
                --issuer "$APPLE_API_ISSUER_ID" \
                --wait
            else
              xcrun notarytool submit "$path" \
                --apple-id "$APPLE_ID" \
                --team-id "$APPLE_TEAM_ID" \
                --password "$APPLE_APP_SPECIFIC_PASSWORD" \
                --wait
            fi
          }

          codesign --force --timestamp --options runtime \
            --entitlements "$ENTITLEMENTS" \
            --sign "$APPLE_CODESIGN_IDENTITY" \
            "$APP/Contents/Resources/codex-remote"

          codesign --force --timestamp --options runtime \
            --entitlements "$ENTITLEMENTS" \
            --sign "$APPLE_CODESIGN_IDENTITY" \
            "$APP"

          codesign --verify --deep --strict --verbose=2 "$APP"
          ditto -c -k --keepParent "$APP" "$ZIP"
          notary_submit "$ZIP"
          xcrun stapler staple "$APP"

          hdiutil create -volname "Codex Remote" -srcfolder "$APP" -ov -format UDZO "$DMG"
          codesign --force --timestamp --sign "$APPLE_CODESIGN_IDENTITY" "$DMG"
          notary_submit "$DMG"
          xcrun stapler staple "$DMG"

          xcrun stapler validate "$APP"
          xcrun stapler validate "$DMG"
          spctl --assess --type execute --verbose=4 "$APP"
          spctl --assess --type open --context context:primary-signature --verbose=4 "$DMG"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Codex-Remote-macOS
          path: target/dist/Codex Remote.dmg

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: target/dist/Codex Remote.dmg
