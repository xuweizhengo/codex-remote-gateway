name: release-linux

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-package:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install System Dependencies
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            desktop-file-utils \
            dpkg-dev \
            libclang-dev \
            libexpat1-dev \
            libfuse2 \
            libgdk-pixbuf2.0-bin \
            libglib2.0-bin \
            libgl1-mesa-dev \
            libglu1-mesa-dev \
            libgtk-3-bin \
            libgtk-3-dev \
            libjpeg-dev \
            libpng-dev \
            librsvg2-dev \
            libtiff-dev \
            libxkbcommon-dev \
            patchelf \
            pkg-config \
            wget

      - name: Restore Cargo Cache
        uses: Swatinem/rust-cache@v2

      - name: Reset wxWidgets CMake Cache
        run: |
          set -euo pipefail
          rm -rf target/release/wxwidgets_cmake_build
          rm -rf target/release/wxdragon_sys_cmake_build

      - name: Build Release
        run: |
          set -euo pipefail
          cargo build --release --features gui --bin codex-remote
          strip target/release/codex-remote

      - name: Package Tarball
        run: |
          set -euo pipefail
          DIST_ROOT="target/dist"
          PACKAGE_DIR="$DIST_ROOT/Codex Remote Linux x86_64"
          rm -rf "$DIST_ROOT"
          mkdir -p \
            "$PACKAGE_DIR/bin" \
            "$PACKAGE_DIR/share/applications" \
            "$PACKAGE_DIR/share/icons/hicolor/256x256/apps"

          cp target/release/codex-remote "$PACKAGE_DIR/bin/codex-remote"
          cp packaging/linux/codex-remote.desktop "$PACKAGE_DIR/share/applications/codex-remote.desktop"
          cp packaging/icons/dolphin-rounded-256.png "$PACKAGE_DIR/share/icons/hicolor/256x256/apps/codex-remote.png"
          cp README.md README.en.md "$PACKAGE_DIR/"
          if [ -f config.example.toml ]; then
            cp config.example.toml "$PACKAGE_DIR/"
          fi

          tar -C "$DIST_ROOT" -czf "$DIST_ROOT/Codex Remote Linux x86_64.tar.gz" "Codex Remote Linux x86_64"

      - name: Build AppImage
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          DIST_ROOT="target/dist"
          APPDIR="$DIST_ROOT/AppDir"
          rm -rf "$APPDIR"
          mkdir -p \
            "$APPDIR/usr/bin" \
            "$APPDIR/usr/share/applications" \
            "$APPDIR/usr/share/icons/hicolor/256x256/apps"

          cp target/release/codex-remote "$APPDIR/usr/bin/codex-remote"
          cp packaging/linux/codex-remote.desktop "$APPDIR/usr/share/applications/codex-remote.desktop"
          cp packaging/icons/dolphin-rounded-256.png "$APPDIR/usr/share/icons/hicolor/256x256/apps/codex-remote.png"
          desktop-file-validate "$APPDIR/usr/share/applications/codex-remote.desktop"

          wget -q "https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage"
          wget -q "https://raw.githubusercontent.com/linuxdeploy/linuxdeploy-plugin-gtk/master/linuxdeploy-plugin-gtk.sh"
          chmod +x linuxdeploy-x86_64.AppImage linuxdeploy-plugin-gtk.sh

          export LINUXDEPLOY_OUTPUT_VERSION="${VERSION#v}"
          ./linuxdeploy-x86_64.AppImage \
            --appdir "$APPDIR" \
            --executable "$APPDIR/usr/bin/codex-remote" \
            --desktop-file "$APPDIR/usr/share/applications/codex-remote.desktop" \
            --icon-file "$APPDIR/usr/share/icons/hicolor/256x256/apps/codex-remote.png" \
            --plugin gtk \
            --output appimage

          rm -f linuxdeploy-x86_64.AppImage linuxdeploy-plugin-gtk.sh
          APPIMAGE="$(find . -maxdepth 1 -name '*.AppImage' -print -quit)"
          test -n "$APPIMAGE"
          mv "$APPIMAGE" "$DIST_ROOT/Codex Remote Linux x86_64.AppImage"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Codex-Remote-Linux
          path: |
            target/dist/Codex Remote Linux x86_64.AppImage
            target/dist/Codex Remote Linux x86_64.tar.gz

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          body_path: RELEASE_NOTES.md
          overwrite_files: true
          prerelease: ${{ contains(github.ref_name, '-') }}
          make_latest: ${{ contains(github.ref_name, '-') && 'false' || 'true' }}
          files: |
            target/dist/Codex Remote Linux x86_64.AppImage
            target/dist/Codex Remote Linux x86_64.tar.gz
